<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>SBF-Binnen — Amtliche Prüfungsbögen 1–15</title>
<style>
  :root { color-scheme: light dark; }
  * { box-sizing: border-box; }
  html { -webkit-text-size-adjust: 100%; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; max-width: 900px; margin: 0 auto; padding: 1rem; line-height: 1.35; }
  h1 { margin: 0 0 0.2rem; font-size: 1.3rem; line-height: 1.1; }
  .hint { color: #666; margin: 0 0 0.75rem; font-size: 0.82rem; }
  .controls { position: sticky; top: 0; background: Canvas; padding: 0.5rem 0; border-bottom: 1px solid #ccc; z-index: 10; display: flex; gap: 0.5rem; flex-wrap: wrap; align-items: center; }
  .controls label { font-weight: 600; }
  .controls select, .controls button { font: inherit; padding: 0.7rem 0.9rem; border-radius: 10px; border: 1px solid #bbb; background: Canvas; color: inherit; cursor: pointer; }
  .controls select { flex: 1 1 100%; font-size: 1rem; font-weight: 800; min-height: 3.2rem; }
  .controls button { flex: 1 1 100%; min-height: 3rem; }
  .controls button.active { background: #1f6feb; color: white; border-color: #1f6feb; }
  .meta { color: #666; font-size: 0.78rem; margin: 0.5rem 0; }
  .q { border: 1px solid #ddd; border-radius: 8px; padding: 0.55rem 0.65rem; margin: 0.45rem 0; }
  .q header { display: flex; justify-content: space-between; gap: 0.5rem; font-size: 0.72rem; color: #666; margin-bottom: 0.25rem; }
  .q .pos { font-weight: 600; color: #333; }
  .q .num { font-family: ui-monospace, monospace; }
  .stem { font-weight: 600; margin: 0.15rem 0 0.35rem; font-size: 0.9rem; }
  ol.answers { list-style: none; padding: 0; margin: 0; }
  ol.answers li { padding: 0.26rem 0.38rem; border-radius: 4px; margin: 0.1rem 0; display: flex; gap: 0.35rem; align-items: flex-start; font-size: 0.84rem; font-weight: 700; letter-spacing: 0.01em; }
  ol.answers li.correct { background: #d4edda; color: #155724; font-weight: 800; }
  ol.answers li.wrong { color: #454545; }
  ol.answers .marker { width: 1em; flex-shrink: 0; font-weight: 800; }
  ol.answers .letter { width: 1.3em; flex-shrink: 0; font-weight: 800; }
  body.only-solutions ol.answers li.wrong { display: none; }
  body.only-solutions .stem { opacity: 0.85; }
  body.only-solutions .q { padding: 0.4rem 0.5rem; }
  body.only-solutions ol.answers li.correct { margin-top: 0; }
  @media (max-width: 320px) {
    body { padding: 0.45rem; line-height: 1.25; }
    h1 { font-size: 1rem; }
    .hint { display: none; }
    .controls { gap: 0.3rem; padding: 0.35rem 0; }
    .controls label { display: none; }
    .controls select, .controls button { font-size: 0.8rem; padding: 0.45rem 0.55rem; }
    .controls select { flex: 1 1 100%; min-height: 2.8rem; }
    .controls button { flex: 1 1 100%; min-height: 2.6rem; }
    .meta { font-size: 0.68rem; margin: 0.3rem 0; }
    .q { border-radius: 6px; padding: 0.35rem 0.42rem; margin: 0.28rem 0; }
    .q header { font-size: 0.62rem; margin-bottom: 0.15rem; }
    .stem { font-size: 0.75rem; margin: 0.1rem 0 0.2rem; }
    ol.answers li { font-size: 0.72rem; padding: 0.18rem 0.24rem; gap: 0.22rem; }
    ol.answers .marker { width: 0.8em; }
    ol.answers .letter { width: 1.05em; }
  }
  @media (max-width: 220px) {
    body { padding: 0.3rem; }
    h1, .meta, .hint { display: none; }
    .controls { top: 0; }
    .q { padding: 0.25rem 0.3rem; margin: 0.18rem 0; }
    .q header { font-size: 0.54rem; }
    .stem { font-size: 0.64rem; margin-bottom: 0.12rem; }
    ol.answers li { font-size: 0.63rem; padding: 0.14rem 0.18rem; }
  }
  @media (prefers-color-scheme: dark) {
    .q { border-color: #333; }
    .hint, .q header, .meta { color: #aaa; }
    .controls { border-color: #333; }
    .controls select, .controls button, .controls input { border-color: #444; }
    ol.answers li.correct { background: #1e4620; color: #c8e6c9; }
    ol.answers li.wrong { color: #bbb; }
  }
</style>
</head>
<body class="only-solutions">
<h1>SBF-Binnen — Amtliche Prüfungsbögen</h1>
<p class="hint">15 offizielle Prüfungsbögen für den Sportbootführerschein Binnen Motor + Segeln mit je 37 Fragen. Die korrekte Antwort ist grün markiert.</p>
<div class="controls">
  <label for="bogen">Prüfungsbogen:</label>
  <select id="bogen"></select>
  <button id="toggle" class="active">Alle Antworten anzeigen</button>
</div>
<p class="meta" id="meta"></p>
<main id="list"></main>
<script src="./sbf_binnen_data.js"></script>
<script>
  const DATA = window.SBF_BINNEN_DATA;
  const bogenSel = document.getElementById('bogen');
  const list = document.getElementById('list');
  const meta = document.getElementById('meta');
  const toggle = document.getElementById('toggle');

  for (let i = 1; i <= 15; i++) {
    const o = document.createElement('option');
    o.value = i;
    o.textContent = 'Bogen ' + String(i).padStart(2, '0');
    bogenSel.appendChild(o);
  }

  function escapeHtml(s) {
    return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  function render(bogen) {
    const qs = DATA[bogen];
    meta.textContent = `Bogen ${String(bogen).padStart(2,'0')} — ${qs.length} Fragen`;
    list.innerHTML = qs.map((q, i) => {
      const stem = escapeHtml(q.s);
      const answers = ['a','b','c','d'].map(letter => {
        const txt = escapeHtml(q[letter]);
        const isCorrect = letter === q.correct;
        const cls = isCorrect ? 'correct' : 'wrong';
        const marker = isCorrect ? '✓' : '✗';
        return `<li class="${cls}"><span class="marker">${marker}</span><span class="letter">${letter})</span> ${txt}</li>`;
      }).join('');
      return `<article class="q">
        <header><span class="pos">Frage ${i+1} / 37</span><span class="num">Katalog-Nr. ${q.n}</span></header>
        <p class="stem">${stem}</p>
        <ol class="answers">${answers}</ol>
      </article>`;
    }).join('');
  }

  bogenSel.addEventListener('change', () => {
    const b = bogenSel.value;
    render(b);
    localStorage.setItem('sbf-binnen-bogen', b);
  });
  toggle.addEventListener('click', () => {
    document.body.classList.toggle('only-solutions');
    const on = document.body.classList.contains('only-solutions');
    toggle.textContent = on ? 'Alle Antworten zeigen' : 'Nur Lösungen anzeigen';
    toggle.classList.toggle('active', on);
  });

  const saved = localStorage.getItem('sbf-binnen-bogen') || '1';
  bogenSel.value = saved;
  render(saved);
</script>
</body>
</html>
